# config.yaml
model_name: "Qwen/Qwen2.5-7B-Instruct"
output_dir: "./qwen-lora-adapter"

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj" 
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

train:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  num_train_epochs: 3
  fp16: true
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  report_to: "none"
  max_length: 512